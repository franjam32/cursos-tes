<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta http-equiv="Cross-Origin-Opener-Policy" content="unsafe-none">
<title>Mis Cursos · TES</title>
<link rel="manifest" href="/cursos-tes/manifest.json">
<meta name="theme-color" content="#00e5a0">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/npm/twemoji@14/2/72x72/1f4cb.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

  :root {
    --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e28; --border:#252a38;
    --accent:#00e5a0; --accent2:#7b5ea7; --text:#e8eaf2;
    --muted:#5a6280; --success:#00e5a0; --card-radius:16px;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:env(safe-area-inset-bottom,20px); }

  /* LOGIN */
  .login-screen {
    position:fixed; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999; padding:30px;
  }
  .login-logo { font-family:'DM Serif Display',serif; font-size:32px; color:var(--text); margin-bottom:4px; }
  .login-logo span { color:#00e5a0; }
  .login-sub { font-size:13px; color:var(--muted); margin-bottom:40px; text-align:center; line-height:1.5; }

  .login-box { width:100%; max-width:340px; }
  .login-field-label { font-size:11px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; display:block; }

  .email-input {
    width:100%; background:var(--bg3); border:1.5px solid var(--border);
    border-radius:12px; padding:14px 16px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:16px; outline:none;
    transition:border-color 0.15s; -webkit-appearance:none;
    margin-bottom:12px;
  }
  .email-input:focus { border-color:#00e5a0; box-shadow:0 0 0 3px rgba(0,229,160,0.12); }
  .email-input::placeholder { color:var(--muted); }

  .btn-entrar {
    width:100%; padding:14px; border-radius:12px; border:none;
    background:#00e5a0; color:#050f08;
    font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700;
    cursor:pointer; transition:all 0.15s; opacity:0.4; pointer-events:none;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-entrar.active { opacity:1; pointer-events:all; }
  .btn-entrar:active { transform:scale(0.98); }

  .login-error {
    background:rgba(255,96,96,0.10); border:1px solid rgba(255,96,96,0.3);
    border-radius:10px; padding:10px 14px; font-size:13px; color:#ff8080;
    margin-top:12px; text-align:center; display:none;
  }
  .login-note { margin-top:14px; font-size:11px; color:var(--muted); text-align:center; line-height:1.6; display:none; }

  /* NOTIF BANNER */
  .notif-banner {
    background:rgba(0,229,160,0.08); border:1px solid rgba(0,229,160,0.2);
    border-radius:12px; margin:10px 14px 0; padding:10px 14px;
    display:flex; align-items:center; gap:10px; cursor:pointer;
  }
  .notif-banner-text { flex:1; font-size:12px; color:#00e5a0; line-height:1.4; }
  .notif-banner-btn { background:#00e5a0; color:#050f08; border:none; border-radius:8px; padding:5px 12px; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; }

  /* SYNC BAR */
  .sync-bar { display:flex; align-items:center; gap:6px; padding:5px 14px; background:#0f1219; border-bottom:1px solid #1e2535; font-size:11px; color:var(--muted); }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background 0.3s; }
  .sync-dot.ok { background:#00e5a0; }
  .sync-dot.syncing { background:#f0c060; animation:pulse 1s infinite; }
  .sync-dot.error { background:#ff6060; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sync-user { margin-left:auto; font-weight:600; color:#00e5a0; font-size:12px; }
  .btn-sync { background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:2px 5px; }

  /* HEADER */
  .header { background:#13161e; border-bottom:1px solid #252a38; padding:12px 14px 10px; padding-top:calc(env(safe-area-inset-top,0px) + 12px); position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .logo { font-family:'DM Serif Display',serif; font-size:19px; color:var(--text); }
  .logo span { color:#00e5a0; }
  .btn-icono { background:var(--bg3); border:1px solid var(--border); border-radius:9px; padding:7px 10px; font-size:13px; cursor:pointer; color:var(--muted); }
  .tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { background:var(--bg3); border:1px solid var(--border); color:var(--muted); border-radius:20px; padding:4px 11px; font-size:12px; font-weight:500; white-space:nowrap; cursor:pointer; transition:all 0.15s; flex-shrink:0; }
  .tab.active { background:#00e5a0; border-color:#00c888; color:#050f08; font-weight:700; }

  /* CONTENT */
  .content { padding:13px; }
  .section-title { font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; padding-left:3px; }

  /* SUMMARY */
  .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .summary-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
  .summary-label { font-size:10px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .summary-value { font-family:'DM Serif Display',serif; font-size:26px; color:#00e5a0; line-height:1; }
  .summary-sub { font-size:11px; color:var(--muted); margin-top:3px; }

  /* PRÓXIMO */
  .proximo-card { background:rgba(0,229,160,0.06); border:1px solid rgba(0,229,160,0.2); border-radius:var(--card-radius); padding:14px; margin-bottom:14px; position:relative; overflow:hidden; }
  .proximo-card::before { content:'PRÓXIMO'; position:absolute; top:10px; right:12px; font-size:9px; font-weight:700; letter-spacing:1px; color:#00e5a0; opacity:0.6; }
  .proximo-fecha { font-size:12px; color:#00e5a0; font-weight:600; margin-bottom:4px; }
  .proximo-lugar { font-size:16px; font-weight:700; color:var(--text); margin-bottom:5px; }
  .proximo-meta { font-size:12px; color:var(--muted); }
  .proximo-actions { display:flex; gap:7px; margin-top:10px; padding-top:10px; border-top:1px solid rgba(0,229,160,0.15); }
  .btn-proximo { flex:1; padding:8px; border-radius:8px; border:1px solid rgba(0,229,160,0.3); background:rgba(0,229,160,0.10); color:#00e5a0; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; text-align:center; }

  /* CARDS */
  .curso-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--card-radius); padding:13px 14px; margin-bottom:9px; cursor:pointer; transition:all 0.15s; position:relative; overflow:hidden; }
  .curso-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:3px 0 0 3px; }
  .curso-card.tipo-ppaa  { background:rgba(0,229,160,0.05);  border-color:rgba(0,229,160,0.18); }
  .curso-card.tipo-ppaa::before  { background:#00e5a0; }
  .curso-card.tipo-desa  { background:rgba(90,184,248,0.05); border-color:rgba(90,184,248,0.18); }
  .curso-card.tipo-desa::before  { background:#5ab8f8; }
  .curso-card.tipo-svb   { background:rgba(240,168,80,0.05); border-color:rgba(240,168,80,0.18); }
  .curso-card.tipo-svb::before   { background:#f0a850; }
  .curso-card.tipo-tpc   { background:rgba(255,112,96,0.05); border-color:rgba(255,112,96,0.18); }
  .curso-card.tipo-tpc::before   { background:#ff7060; }
  .curso-card.tipo-amv   { background:rgba(160,128,224,0.07);border-color:rgba(160,128,224,0.2); }
  .curso-card.tipo-amv::before   { background:#a080e0; }
  .curso-card.tipo-otro::before  { background:var(--muted); }
  .curso-card.realizado  { opacity:0.45; }
  .curso-card.realizado::before  { background:#3a4060 !important; }
  .curso-card:active { transform:scale(0.99); }

  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:7px; }
  .tipo-badge { font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; padding:3px 8px; border-radius:5px; background:var(--bg3); }
  .tipo-ppaa { color:#00e5a0; } .tipo-desa { color:#5ab8f8; } .tipo-svb { color:#f0a850; }
  .tipo-tpc  { color:#ff7060; } .tipo-amv  { color:#a080e0; } .tipo-otro { color:var(--muted); }
  .card-fecha { font-size:12px; color:var(--muted); font-weight:500; }
  .card-lugar { font-size:15px; font-weight:600; color:var(--text); margin-bottom:5px; line-height:1.3; }
  .card-meta  { display:flex; gap:11px; flex-wrap:wrap; }
  .meta-item  { display:flex; align-items:center; gap:3px; font-size:12px; color:var(--muted); }
  .realizado-badge { font-size:10px; font-weight:600; color:#00e5a0; background:rgba(0,229,160,0.12); border:1px solid rgba(0,229,160,0.25); border-radius:5px; padding:2px 7px; }
  .card-actions { display:flex; gap:6px; margin-top:9px; padding-top:9px; border-top:1px solid var(--border); }
  .btn-accion { flex:1; padding:6px 8px; border-radius:8px; border:1px solid rgba(0,229,160,0.3); background:rgba(0,229,160,0.08); color:#00e5a0; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px; }

  /* EMPTY */
  .empty-state { text-align:center; padding:50px 20px; color:var(--muted); }
  .empty-icon  { font-size:44px; margin-bottom:10px; }
  .empty-title { font-family:'DM Serif Display',serif; font-size:19px; color:var(--text); margin-bottom:5px; }
  .empty-sub   { font-size:13px; line-height:1.5; }

  /* COUNTER */
  .counter-strip { display:flex; gap:7px; margin-bottom:12px; flex-wrap:wrap; }
  .counter-pill { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:5px 10px; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:4px; }
  .counter-pill strong { color:var(--text); font-size:13px; }

  /* MODALS */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; backdrop-filter:blur(4px); }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--bg2); border-radius:20px 20px 0 0; border:1px solid var(--border); border-bottom:none; width:100%; max-width:600px; max-height:92vh; overflow-y:auto; padding:20px 17px; padding-bottom:calc(env(safe-area-inset-bottom,20px) + 20px); transform:translateY(40px); transition:transform 0.25s cubic-bezier(0.32,0.72,0,1); }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 15px; }
  .modal-title { font-family:'DM Serif Display',serif; font-size:20px; margin-bottom:17px; color:var(--text); }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:13px; }
  .detail-item { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:9px 11px; }
  .detail-item.full { grid-column:span 2; }
  .detail-label { font-size:10px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
  .detail-value { font-size:14px; font-weight:500; color:var(--text); white-space:pre-wrap; line-height:1.5; }
  .horas-big { font-family:'DM Serif Display',serif; font-size:30px; color:#a080e0; }
  .modal-footer { display:flex; gap:8px; margin-top:17px; }
  .btn-cancel { flex:1; padding:13px; border-radius:12px; border:1px solid var(--border); background:var(--bg3); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-save   { flex:2; padding:13px; border-radius:12px; border:none; background:#00e5a0; color:#050f08; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; }

  /* CAL MODAL */
  .cal-modal { background:var(--bg2); border-radius:20px 20px 0 0; border:1px solid var(--border); border-bottom:none; width:100%; max-width:600px; padding:20px 17px; padding-bottom:calc(env(safe-area-inset-bottom,20px) + 20px); transform:translateY(40px); transition:transform 0.25s cubic-bezier(0.32,0.72,0,1); }
  .modal-overlay.open .cal-modal { transform:translateY(0); }
  .cal-option { display:flex; align-items:center; gap:13px; background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:13px 14px; margin-bottom:9px; cursor:pointer; transition:all 0.15s; text-align:left; width:100%; }
  .cal-option:active { transform:scale(0.98); }
  .cal-icon { font-size:26px; flex-shrink:0; width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:10px; }
  .cal-icon.gc  { background:rgba(0,229,160,0.12); }
  .cal-icon.ics { background:rgba(90,184,248,0.12); }
  .cal-text { flex:1; }
  .cal-title { font-size:15px; font-weight:600; color:var(--text); margin-bottom:2px; }
  .cal-sub   { font-size:12px; color:var(--muted); line-height:1.4; }

  /* CALENDARIO VISTA */
  .cal-grid-header { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:4px; }
  .cal-day-name { text-align:center; font-size:10px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--muted); padding:4px 0; }
  .cal-grid-wrap { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .cal-cell { min-height:52px; border-radius:8px; padding:4px; background:var(--bg3); border:1px solid var(--border); cursor:pointer; transition:all 0.12s; position:relative; }
  .cal-cell.vacio { background:transparent; border-color:transparent; cursor:default; }
  .cal-cell.hoy { border-color:#00e5a0; }
  .cal-cell.hoy .cal-num { color:#00e5a0; }
  .cal-num { font-size:11px; font-weight:600; color:var(--muted); margin-bottom:3px; }
  .cal-dot-wrap { display:flex; flex-wrap:wrap; gap:2px; }
  .cal-dot { height:14px; border-radius:3px; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 3px; }
  .cal-dot.ppaa  { background:rgba(0,229,160,0.25); color:#00e5a0; }
  .cal-dot.desa  { background:rgba(90,184,248,0.22); color:#5ab8f8; }
  .cal-dot.svb   { background:rgba(240,168,80,0.22); color:#f0a850; }
  .cal-dot.tpc   { background:rgba(255,112,96,0.22); color:#ff7060; }
  .cal-dot.amv   { background:rgba(160,128,224,0.22); color:#a080e0; }
  .cal-dot.otro  { background:rgba(122,128,153,0.18); color:#8a90a8; }
  .cal-dot.realizado { opacity:0.35; }

  /* PWA HINT */
  .install-hint { background:rgba(123,94,167,0.10); border:1px solid rgba(123,94,167,0.22); border-radius:10px; padding:10px 14px; margin:10px 14px 0; font-size:12px; color:#a080e0; line-height:1.5; display:none; }

  /* CHECKLIST */
  .checklist-wrap { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
  .check-item { display:flex; align-items:center; gap:10px; background:var(--bg3); border:1px solid var(--border); border-radius:9px; padding:8px 12px; cursor:pointer; transition:all 0.15s; user-select:none; }
  .check-item:active { transform:scale(0.98); }
  .check-item.done { background:rgba(0,229,160,0.08); border-color:rgba(0,229,160,0.25); }
  .check-circle { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; transition:all 0.15s; }
  .check-item.done .check-circle { background:#00e5a0; border-color:#00e5a0; color:#050f08; font-weight:700; }
  .check-label { font-size:13px; font-weight:500; color:var(--text); flex:1; }
  .check-item.done .check-label { color:var(--muted); text-decoration:line-through; }
  .checklist-progress { display:flex; gap:3px; margin-top:6px; }
  .progress-step { flex:1; height:3px; border-radius:2px; background:var(--border); transition:background 0.3s; }
  .progress-step.done { background:#00e5a0; }
  .checklist-completo { font-size:11px; font-weight:700; color:#00e5a0; text-align:center; margin-top:4px; letter-spacing:0.5px; }

  .spinner { display:inline-block; width:13px; height:13px; border:2px solid rgba(5,15,8,0.2); border-top-color:#050f08; border-radius:50%; animation:spin 0.6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .toast { position:fixed; bottom:calc(env(safe-area-inset-bottom,20px) + 16px); left:50%; transform:translateX(-50%) translateY(80px); background:#00b880; color:white; padding:9px 18px; border-radius:20px; font-size:13px; font-weight:600; z-index:500; transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">Mis Cursos <span>·</span> TES</div>
  <div class="login-sub">Introduce tu correo electrónico<br>para acceder a tus cursos asignados</div>

  <div class="login-box">
    <label class="login-field-label" for="emailInput">Correo electrónico</label>
    <input type="email" class="email-input" id="emailInput"
      placeholder="tunombre@correo.com"
      autocomplete="email" autocapitalize="none" spellcheck="false"
      oninput="onEmailInput()" onkeydown="if(event.key==='Enter')entrar()">
    <button class="btn-entrar" id="btnEntrar" onclick="entrar()">
      <span id="btnLabel">Acceder a mis cursos</span>
    </button>
    <div class="login-error" id="loginError"></div>
    <div class="login-note" id="loginNote">Verificando correo…</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="install-hint" id="installHint"></div>

  <div id="notifBanner" style="display:none">
    <div class="notif-banner" onclick="pedirPermisoNotificaciones()">
      <span style="font-size:18px">🔔</span>
      <div class="notif-banner-text">Activa notificaciones para avisos de tus cursos</div>
      <button class="notif-banner-btn">Activar</button>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncMsg">Conectando…</span>
    <button class="btn-sync" onclick="sincronizar()">↺</button>
    <div class="sync-user" id="syncUser"></div>
  </div>

  <div class="header">
    <div class="header-top">
      <div class="logo">Mis Cursos <span>·</span> TES</div>
      <div style="display:flex;gap:6px">
        <button class="btn-icono" onclick="exportarMisCursos()" title="Exportar">📤</button>
        <button class="btn-icono" onclick="cerrarSesion()" title="Cerrar sesión" style="color:#ff6060">✕</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="filtrar('todos',this)">Todos</div>
      <div class="tab" onclick="filtrar('pendiente',this)">Pendientes</div>
      <div class="tab" onclick="filtrar('realizado',this)">Realizados</div>
      <div class="tab" onclick="filtrar('cal',this)">📅 Mes</div>
    </div>
  </div>

  <div class="content" id="listaView">
    <div id="proximoWrap"></div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="counter-strip" id="counterStrip"></div>
    <div class="section-title" id="sectionTitle">Todos mis cursos</div>
    <div id="lista"></div>
  </div>

  <div id="calView" style="display:none">
    <div style="background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px">
        <button class="btn-sync" onclick="cambiarMes(-1)" style="font-size:18px;padding:4px 10px">‹</button>
        <span id="calMesLabel" style="font-family:'DM Serif Display',serif;font-size:17px;color:var(--text)"></span>
        <button class="btn-sync" onclick="cambiarMes(1)" style="font-size:18px;padding:4px 10px">›</button>
      </div>
    </div>
    <div id="calGrid" style="padding:12px 12px 20px"></div>
  </div>
</div>

<!-- DETALLE -->
<div class="modal-overlay" id="detalleOverlay" onclick="cerrarSiOverlay(event,'detalleOverlay')">
  <div class="modal" id="detalleModal"></div>
</div>

<!-- CALENDARIO -->
<div class="modal-overlay" id="calOverlay" onclick="cerrarSiOverlay(event,'calOverlay')">
  <div class="cal-modal">
    <div class="modal-handle"></div>
    <div class="modal-title" style="margin-bottom:14px">📅 Añadir al calendario</div>
    <div id="calInfo" style="font-size:13px;color:var(--muted);margin-bottom:14px;padding:10px 12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)"></div>
    <button class="cal-option" onclick="abrirGoogleCalendar()">
      <div class="cal-icon gc">📆</div>
      <div class="cal-text"><div class="cal-title">Google Calendar</div><div class="cal-sub">Abre en el navegador. Funciona en iPhone y Android.</div></div>
      <span style="color:var(--muted);font-size:16px">›</span>
    </button>
    <button class="cal-option" onclick="descargarICS()">
      <div class="cal-icon ics">📁</div>
      <div class="cal-text"><div class="cal-title">Calendario nativo</div><div class="cal-sub">Descarga .ics — iPhone Safari lo abre directamente.</div></div>
      <span style="color:var(--muted);font-size:16px">›</span>
    </button>
    <button class="btn-cancel" style="width:100%;margin-top:4px" onclick="cerrarCalModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID  = '756258617711-pqe3js4qqshdsfmr7of7d3ga0r6r9kd9.apps.googleusercontent.com';
const SHEET_ID   = '1ss-INGy2LgBaREteyrPQB35AiAzgTpecrRKUfE8oxp0';
const SCOPES     = 'https://www.googleapis.com/auth/spreadsheets';
const DISCOVERY  = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
const TAB_CURSOS = 'CURSOS';
const TAB_INS    = 'INSTRUCTORES';

let cursos=[], misCursos=[], filtroActivo='todos';
let usuarioActual='', emailActual='';
let gapiOk=false, gisOk=false, tokenClient=null, syncTimer=null;
let calMes=new Date().getMonth(), calAnyo=new Date().getFullYear();
let vistaCalendario=false, _calCurso=null;

// ── EMAIL INPUT ────────────────────────────────────────────────
function onEmailInput() {
  const val = document.getElementById('emailInput').value.trim();
  const valido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  const btn = document.getElementById('btnEntrar');
  btn.classList.toggle('active', valido);
  document.getElementById('loginError').style.display = 'none';
}

function entrar() {
  const email = document.getElementById('emailInput').value.trim().toLowerCase();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return;

  emailActual = email;
  document.getElementById('loginNote').style.display = 'block';
  document.getElementById('loginNote').textContent = 'Verificando correo…';
  document.getElementById('btnEntrar').innerHTML = '<span class="spinner"></span>';
  document.getElementById('loginError').style.display = 'none';

  cargarGoogleAPI();
}

function cargarGoogleAPI() {
  const s1 = document.createElement('script');
  s1.src = 'https://apis.google.com/js/api.js';
  s1.onload = () => {
    gapi.load('client', async () => {
      await gapi.client.init({ discoveryDocs:[DISCOVERY] });
      gapiOk = true; tryAuth();
    });
  };
  document.head.appendChild(s1);

  const s2 = document.createElement('script');
  s2.src = 'https://accounts.google.com/gsi/client';
  s2.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: async (resp) => {
        if (resp.error) { mostrarErrorLogin('Error de autenticación con Google.'); return; }
        await verificarEmailEnSheet();
      },
    });
    gisOk = true; tryAuth();
  };
  document.head.appendChild(s2);
}

function tryAuth() { if (gapiOk && gisOk) tokenClient.requestAccessToken({ prompt:'select_account' }); }

// ── VERIFICAR EMAIL EN HOJA INSTRUCTORES ─────────────────────
async function verificarEmailEnSheet() {
  document.getElementById('loginNote').textContent = 'Buscando tu perfil…';
  try {
    const r = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: SHEET_ID,
      range: `${TAB_INS}!A:B`,
    });
    const rows = r.result.values || [];
    // Buscar correo (col A) ignorando cabecera y mayúsculas
    const fila = rows.slice(1).find(row => (row[0]||'').toLowerCase().trim() === emailActual);

    if (!fila) {
      mostrarErrorLogin('Este correo no está registrado como instructor. Contacta con el administrador.');
      return;
    }

    usuarioActual = fila[1] || emailActual;
    mostrarApp();
    await cargarCursos();
    iniciarAutoSync();
    verificarNotificacionesPendientes();

  } catch(e) {
    console.error(e);
    mostrarErrorLogin('Error al verificar el correo. Inténtalo de nuevo.');
  }
}

function mostrarErrorLogin(msg) {
  const err = document.getElementById('loginError');
  err.textContent = msg;
  err.style.display = 'block';
  document.getElementById('loginNote').style.display = 'none';
  document.getElementById('btnEntrar').innerHTML = '<span id="btnLabel">Acceder a mis cursos</span>';
  document.getElementById('btnEntrar').classList.add('active');
}

function mostrarApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('syncUser').textContent = '👤 ' + usuarioActual;
  setSyncSyncing('Cargando cursos…');
  mostrarHintPWA();
  mostrarBannerNotificaciones();
  // Guardar sesión en localStorage para reconexión rápida
  localStorage.setItem('ins_email', emailActual);
  localStorage.setItem('ins_nombre', usuarioActual);
}

// ── CERRAR SESIÓN ─────────────────────────────────────────────
function cerrarSesion() {
  if (!confirm('¿Cerrar sesión?')) return;
  localStorage.removeItem('ins_email');
  localStorage.removeItem('ins_nombre');
  location.reload();
}

// ── CARGAR CURSOS ─────────────────────────────────────────────
async function cargarCursos() {
  setSyncSyncing('Sincronizando…');
  try {
    const r = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: SHEET_ID,
      range: `${TAB_CURSOS}!A:N`,
    });
    const rows = r.result.values || [];
    if (rows.length <= 1) { misCursos=[]; render(); setSyncOk('Sin cursos asignados'); return; }

    cursos = rows.slice(1).filter(r=>r&&r[1]).map((r,i) => ({
      _row:  i+2,
      realizado: r[0]==='TRUE'||r[0]===true||r[0]==='VERDADERO',
      fecha: r[1]||'', inicio:normH(r[2]||''), fin:normH(r[3]||''),
      curso: r[4]||'', lugar: r[5]||'',
      instructor:r[6]||'', solicitante:r[7]||'',
      obs:   r[8]||'', autor:r[9]||'',
      docRecogida:  r[11]==='TRUE'||r[11]===true||r[11]==='VERDADERO',
      docEntregada: r[12]==='TRUE'||r[12]===true||r[12]==='VERDADERO',
      factEmitida:  r[13]==='TRUE'||r[13]===true||r[13]==='VERDADERO',
    }));

    // Filtrar solo los cursos donde el instructor coincide con el nombre del usuario
    misCursos = cursos.filter(c =>
      c.instructor?.toLowerCase().includes(usuarioActual.toLowerCase())
    );

    setSyncOk(`Actualizado · ${new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}`);
    render();
    programarNotificaciones();
  } catch(e) {
    console.error(e);
    setSyncError('Error al conectar con el Sheet');
  }
}

function normH(h) {
  if(!h) return '';
  const p=h.toString().split(':');
  return p.length>=2?p[0].padStart(2,'0')+':'+p[1].padStart(2,'0'):h;
}

async function sincronizar() { await cargarCursos(); if(vistaCalendario) renderCalendario(); }
function iniciarAutoSync() { if(syncTimer) clearInterval(syncTimer); syncTimer=setInterval(cargarCursos,60000); }
function setSyncOk(m)      { _sync('ok',m); }
function setSyncSyncing(m) { _sync('syncing',m); }
function setSyncError(m)   { _sync('error',m); }
function _sync(e,m) { document.getElementById('syncDot').className=`sync-dot ${e}`; document.getElementById('syncMsg').textContent=m; }

// ── HELPERS ───────────────────────────────────────────────────
function tipoKey(v) {
  const s=(v||'').toLowerCase();
  if(s.includes('ppaa')||s.includes('primeros')) return 'ppaa';
  if(s.includes('desa')) return 'desa';
  if(s.includes('svb')||s.includes('soporte')) return 'svb';
  if(s.includes('tpc')||s.includes('transporte')) return 'tpc';
  if(s.includes('amv')||s.includes('múltiples')||s.includes('multiples')) return 'amv';
  return 'otro';
}

function fechaISO(f) {
  if(!f) return '';
  if(f.includes('/')) { const p=f.split('/'); return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }
  return f;
}

function formatFecha(f) {
  if(!f) return '—';
  const iso=fechaISO(f);
  const d=new Date(iso+'T12:00');
  if(isNaN(d)) return f;
  return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
}

function calcH(ini,fin) {
  const [ih,im]=ini.split(':').map(Number),[fh,fm]=fin.split(':').map(Number);
  let m=(fh*60+fm)-(ih*60+im); if(m<0)m+=1440;
  return (m/60).toFixed(1);
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const proximos=misCursos.filter(c=>{
    const d=new Date(fechaISO(c.fecha)+'T12:00');
    return !c.realizado&&d>=hoy;
  }).sort((a,b)=>new Date(fechaISO(a.fecha))-new Date(fechaISO(b.fecha)));

  // Próximo curso
  const pw=document.getElementById('proximoWrap');
  const proximo=proximos[0];
  if(proximo&&filtroActivo==='todos') {
    const dias=Math.round((new Date(fechaISO(proximo.fecha)+'T12:00')-hoy)/(864e5));
    const dl=dias===0?'HOY':dias===1?'MAÑANA':`EN ${dias} DÍAS`;
    const horas=proximo.inicio&&proximo.fin?calcH(proximo.inicio,proximo.fin):'';
    pw.innerHTML=`<div class="proximo-card">
      <div class="proximo-fecha">${dl} · ${formatFecha(proximo.fecha)}</div>
      <div class="proximo-lugar">${proximo.lugar||'Sin ubicación'}</div>
      <div class="proximo-meta">${proximo.curso||''}${proximo.inicio&&proximo.fin?` · ${proximo.inicio}–${proximo.fin}`:''}${horas?` · ${horas}h`:''}${proximo.solicitante?` · ${proximo.solicitante}`:''}</div>
      <div class="proximo-actions">
        <button class="btn-proximo" data-action="cal" data-idx="${misCursos.indexOf(proximo)}">📅 Añadir al calendario</button>
      </div>
    </div>`;
  } else pw.innerHTML='';

  // Summary
  const realizados=misCursos.filter(c=>c.realizado).length;
  const totalH=misCursos.filter(c=>c.realizado&&c.inicio&&c.fin).reduce((s,c)=>s+parseFloat(calcH(c.inicio,c.fin)),0);
  if(filtroActivo==='todos') {
    document.getElementById('summaryGrid').innerHTML=`
      <div class="summary-card"><div class="summary-label">Pendientes</div><div class="summary-value">${proximos.length}</div><div class="summary-sub">cursos asignados</div></div>
      <div class="summary-card"><div class="summary-label">Realizados</div><div class="summary-value" style="color:#a080e0">${realizados}</div><div class="summary-sub">${totalH.toFixed(0)}h impartidas</div></div>`;
  } else document.getElementById('summaryGrid').innerHTML='';

  document.getElementById('counterStrip').innerHTML=
    `<div class="counter-pill">📚 <strong>${misCursos.length}</strong> mis cursos</div>`+
    `<div class="counter-pill">🕐 <strong>${proximos.length}</strong> pendientes</div>`;

  // Lista
  let datos=[...misCursos];
  if(filtroActivo==='pendiente') datos=datos.filter(c=>!c.realizado);
  else if(filtroActivo==='realizado') datos=datos.filter(c=>c.realizado);
  datos.sort((a,b)=>new Date(fechaISO(a.fecha))-new Date(fechaISO(b.fecha)));

  const lista=document.getElementById('lista');
  if(!datos.length) {
    lista.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Sin cursos</div><div class="empty-sub">No tienes cursos ${filtroActivo==='pendiente'?'pendientes':'registrados'} en este momento.</div></div>`;
    return;
  }

  lista.innerHTML=datos.map(c=>{
    const tk=tipoKey(c.curso);
    const horas=c.inicio&&c.fin?calcH(c.inicio,c.fin):'';
    const idx=misCursos.indexOf(c);
    return `<div class="curso-card tipo-${tk} ${c.realizado?'realizado':''}" data-action="detalle" data-idx="${idx}">
      <div class="card-header">
        <div style="display:flex;gap:6px;align-items:center">
          <span class="tipo-badge tipo-${tk}">${c.curso||'—'}</span>
          ${c.realizado?'<span class="realizado-badge">✓ Realizado</span>':''}
        </div>
        <span class="card-fecha">${formatFecha(c.fecha)}</span>
      </div>
      <div class="card-lugar">${c.lugar||'Sin ubicación'}</div>
      <div class="card-meta">
        ${c.inicio&&c.fin?`<span class="meta-item">🕐 ${c.inicio}–${c.fin}</span>`:''}
        ${horas?`<span class="meta-item">⏱ ${horas}h</span>`:''}
        ${c.solicitante?`<span class="meta-item">🏢 ${c.solicitante}</span>`:''}
      </div>
      ${!c.realizado ? renderChecklist(c, idx) : ''}
      <div class="card-actions">
        <button class="btn-accion" data-action="cal" data-idx="${idx}">📅 Calendario</button>
      </div>
    </div>`;
  }).join('');
}

function filtrar(tipo,el) {
  filtroActivo=tipo;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(tipo==='cal') {
    vistaCalendario=true;
    document.getElementById('listaView').style.display='none';
    document.getElementById('calView').style.display='block';
    renderCalendario(); return;
  }
  vistaCalendario=false;
  document.getElementById('listaView').style.display='block';
  document.getElementById('calView').style.display='none';
  document.getElementById('sectionTitle').textContent={todos:'Todos mis cursos',pendiente:'Pendientes',realizado:'Realizados'}[tipo]||tipo;
  render();
}

// ── DETALLE ───────────────────────────────────────────────────
function verDetalle(idx) {
  const c=misCursos[idx]; if(!c) return;
  const tk=tipoKey(c.curso);
  const horas=c.inicio&&c.fin?calcH(c.inicio,c.fin):'';
  document.getElementById('detalleModal').innerHTML=`
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;flex-wrap:wrap;gap:6px">
      <span class="tipo-badge tipo-${tk}">${c.curso||'—'}</span>
      ${c.realizado?'<span class="realizado-badge">✓ Realizado</span>':'<span style="font-size:11px;color:#00e5a0;font-weight:600">Pendiente</span>'}
      <span style="font-size:12px;color:var(--muted)">${formatFecha(c.fecha)}</span>
    </div>
    <div class="modal-title">${c.lugar||'Sin ubicación'}</div>
    ${horas?`<div class="horas-big">${horas}<span style="font-size:14px;color:var(--muted)"> h</span></div>`:''}
    <div class="detail-grid" style="margin-top:13px">
      ${c.inicio?`<div class="detail-item"><div class="detail-label">Inicio</div><div class="detail-value">${c.inicio}</div></div>`:''}
      ${c.fin?`<div class="detail-item"><div class="detail-label">Fin</div><div class="detail-value">${c.fin}</div></div>`:''}
      ${c.solicitante?`<div class="detail-item full"><div class="detail-label">Solicitante</div><div class="detail-value">${c.solicitante}</div></div>`:''}
      ${c.obs?`<div class="detail-item full"><div class="detail-label">Observaciones</div><div class="detail-value">${c.obs}</div></div>`:''}
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="cerrarDetalle()">Cerrar</button>
      <button class="btn-save" onclick="cerrarDetalle();abrirCalModal(${idx})">📅 Calendario</button>
    </div>`;
  document.getElementById('detalleOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function cerrarDetalle() { document.getElementById('detalleOverlay').classList.remove('open'); document.body.style.overflow=''; }
function cerrarSiOverlay(e,id) { if(e.target===document.getElementById(id)){ document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; } }

// ── CALENDARIO VISTA ──────────────────────────────────────────
function cambiarMes(d) { calMes+=d; if(calMes>11){calMes=0;calAnyo++;}if(calMes<0){calMes=11;calAnyo--;} renderCalendario(); }

function renderCalendario() {
  const label=new Date(calAnyo,calMes,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  document.getElementById('calMesLabel').textContent=label.charAt(0).toUpperCase()+label.slice(1);
  const hoy=new Date(), offset=(new Date(calAnyo,calMes,1).getDay()+6)%7, diasMes=new Date(calAnyo,calMes+1,0).getDate();
  const porDia={};
  misCursos.forEach(c=>{ const k=fechaISO(c.fecha); if(!k) return; const d=new Date(k+'T12:00'); if(d.getMonth()===calMes&&d.getFullYear()===calAnyo){ if(!porDia[k])porDia[k]=[]; porDia[k].push(c); } });
  const dias=['Lu','Ma','Mi','Ju','Vi','Sa','Do'];
  let html=`<div class="cal-grid-header">${dias.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}</div><div class="cal-grid-wrap">`;
  for(let i=0;i<offset;i++) html+='<div class="cal-cell vacio"></div>';
  for(let d=1;d<=diasMes;d++) {
    const key=`${calAnyo}-${String(calMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const esHoy=hoy.getDate()===d&&hoy.getMonth()===calMes&&hoy.getFullYear()===calAnyo;
    const cs=porDia[key]||[];
    const dots=cs.map(c=>`<div class="cal-dot ${tipoKey(c.curso)}${c.realizado?' realizado':''}">${(c.curso||'').substring(0,4)}</div>`).join('');
    html+=`<div class="cal-cell ${cs.length?'':''}${esHoy?' hoy':''}" onclick="mostrarDiaCal('${key}')"><div class="cal-num">${d}</div><div class="cal-dot-wrap">${dots}</div></div>`;
  }
  html+='</div>';
  document.getElementById('calGrid').innerHTML=html;
}

function mostrarDiaCal(key) {
  const cs=misCursos.filter(c=>fechaISO(c.fecha)===key); if(!cs.length) return;
  const fecha=new Date(key+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('detalleModal').innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-title" style="margin-bottom:10px">${fecha}</div>
    ${cs.map(c=>{
      const tk=tipoKey(c.curso); const horas=c.inicio&&c.fin?calcH(c.inicio,c.fin):''; const idx=misCursos.indexOf(c);
      return `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span class="tipo-badge tipo-${tk}">${c.curso||'—'}</span>${c.realizado?'<span class="realizado-badge">✓</span>':''}</div>
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">${c.lugar||'Sin ubicación'}</div>
        <div style="font-size:12px;color:var(--muted)">${c.inicio&&c.fin?`🕐 ${c.inicio}–${c.fin}${horas?` · ${horas}h`:''}`:''} ${c.solicitante?`· ${c.solicitante}`:''}</div>
        <div style="margin-top:8px"><button class="btn-proximo" data-action="caldetalle" data-idx="${idx}">📅 Añadir al calendario</button></div>
      </div>`;
    }).join('')}
    <button class="btn-cancel" style="width:100%;margin-top:4px" onclick="cerrarDetalle()">Cerrar</button>`;
  document.getElementById('detalleOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ── CALENDARIO AÑADIR ─────────────────────────────────────────
function abrirCalModal(idx) {
  const c=misCursos[idx]; if(!c||!c.fecha) return;
  _calCurso=c;
  const horas=c.inicio&&c.fin?calcH(c.inicio,c.fin):'';
  document.getElementById('calInfo').innerHTML=`<strong style="color:var(--text)">${c.curso||'Curso'}: ${c.lugar||''}</strong><br>${formatFecha(c.fecha)}${c.inicio&&c.fin?` · ${c.inicio}–${c.fin}`:''}${horas?` · ${horas}h`:''}`;
  document.getElementById('calOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function cerrarCalModal() { document.getElementById('calOverlay').classList.remove('open'); document.body.style.overflow=''; }

function calDates(c) {
  let ymd;
  if(c.fecha.includes('/')) { const p=c.fecha.split('/'); ymd=`${p[2]}${p[1].padStart(2,'0')}${p[0].padStart(2,'0')}`; }
  else ymd=c.fecha.replace(/-/g,'');
  if(c.inicio&&c.fin) return {i:`${ymd}T${c.inicio.replace(':','')}00`,f:`${ymd}T${c.fin.replace(':','')}00`};
  return {i:ymd,f:ymd};
}

function abrirGoogleCalendar() {
  const c=_calCurso; if(!c) return;
  const {i,f}=calDates(c);
  const t=encodeURIComponent(`${c.curso||'Formación'}: ${c.lugar||''}`);
  const d=encodeURIComponent([c.solicitante&&`Solicitante: ${c.solicitante}`,c.obs&&`Notas: ${c.obs}`].filter(Boolean).join('\n'));
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${t}&dates=${i}/${f}&details=${d}&location=${encodeURIComponent(c.lugar||'')}`, '_blank');
  cerrarCalModal(); mostrarToast('📆 Abriendo Google Calendar…');
}

function descargarICS() {
  const c=_calCurso; if(!c) return;
  const now=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const {i,f}=calDates(c); const allDay=!c.inicio||!c.fin;
  const desc=[c.solicitante&&`Solicitante: ${c.solicitante}`,c.obs&&`Notas: ${c.obs}`].filter(Boolean).join('\\n');
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//TES//ES','BEGIN:VEVENT',
    `UID:curso-${c._row}@tes`,`DTSTAMP:${now}`,
    allDay?`DTSTART;VALUE=DATE:${i}`:`DTSTART:${i}`,
    allDay?`DTEND;VALUE=DATE:${f}`:`DTEND:${f}`,
    `SUMMARY:${c.curso||'Formación'}: ${c.lugar||''}`,`DESCRIPTION:${desc}`,`LOCATION:${c.lugar||''}`,
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url; a.download=`curso_${(c.curso||'').replace(/\s/g,'_')}_${c.fecha.replace(/\//g,'-')}.ics`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  cerrarCalModal(); mostrarToast('📁 Archivo .ics descargado');
}

// ── SERVICE WORKER + NOTIFICACIONES ──────────────────────────
let swReg = null;

async function registrarSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swReg = await navigator.serviceWorker.register('/cursos-tes/sw.js', { scope:'/cursos-tes/' });
    console.log('SW registrado:', swReg.scope);
  } catch(e) { console.warn('SW no registrado:', e); }
}

function mostrarBannerNotificaciones() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notifBanner').style.display = 'block';
  }
}

async function pedirPermisoNotificaciones() {
  if (!('Notification' in window)) { mostrarToast('⚠️ Navegador no compatible','#f0c060'); return; }
  const p = await Notification.requestPermission();
  document.getElementById('notifBanner').style.display = 'none';
  if (p === 'granted') {
    mostrarToast('🔔 Notificaciones activadas');
    // Notif inmediata de confirmación via SW si disponible
    if (swReg) {
      swReg.showNotification('Mis Cursos TES ✓', {
        body: `Hola ${usuarioActual}, recibirás avisos de tus cursos.`,
        icon: 'https://cdn.jsdelivr.net/npm/twemoji@14/2/72x72/1f4cb.png',
        tag: 'bienvenida',
      });
    } else {
      new Notification('Mis Cursos TES ✓', { body:`Hola ${usuarioActual}, recibirás avisos de tus cursos.` });
    }
    programarNotificaciones();
  } else {
    mostrarToast('❌ Notificaciones denegadas','#ff6060');
  }
}

function programarNotificaciones() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const storKey = `notifs_${emailActual}`;
  const enviadas = JSON.parse(localStorage.getItem(storKey) || '{}');
  const ahora = Date.now();

  misCursos.filter(c => !c.realizado).forEach(c => {
    const iso = fechaISO(c.fecha); if (!iso) return;
    const dC = new Date(iso + 'T08:00'); // enviamos a las 8am del día
    const dC3 = new Date(iso + 'T08:00');
    dC3.setDate(dC3.getDate() - 2); // 3 días antes = 2 días antes a las 8am

    const k1 = `${iso}_1d`;
    const k3 = `${iso}_3d`;
    const ahora_ms = Date.now();

    // Notif día anterior: si faltan exactamente 1 día
    const hoyMs = new Date(); hoyMs.setHours(0,0,0,0);
    const diasFaltan = Math.round((new Date(iso+'T12:00') - hoyMs) / 864e5);

    if (diasFaltan === 1 && !enviadas[k1]) {
      const delay = Math.max(0, dC.getTime() - ahora_ms - 864e5); // 1 día antes a las 8am
      enviarNotif({
        title: `⏰ Mañana — ${c.curso || 'Formación'}`,
        body:  `${c.lugar || 'Sin lugar'} · ${c.inicio || ''}${c.fin ? '–'+c.fin : ''}`,
        tag: k1, delay: 500,
      });
      enviadas[k1] = ahora;
    }

    // Notif 3 días antes
    if (diasFaltan === 3 && !enviadas[k3]) {
      enviarNotif({
        title: `📅 En 3 días — ${c.curso || 'Formación'}`,
        body:  `${formatFecha(c.fecha)} · ${c.lugar || 'Sin lugar'}`,
        tag: k3, delay: 1200,
      });
      enviadas[k3] = ahora;
    }

    // Notif al asignar: si el curso fue asignado recientemente (clave no existe y fecha futura)
    const kAsig = `${iso}_asig`;
    if (diasFaltan > 0 && !enviadas[kAsig]) {
      enviarNotif({
        title: `📋 Nuevo curso asignado — ${c.curso || 'Formación'}`,
        body:  `${formatFecha(c.fecha)} · ${c.lugar || 'Sin lugar'}`,
        tag: kAsig, delay: 2000,
      });
      enviadas[kAsig] = ahora;
    }
  });

  localStorage.setItem(storKey, JSON.stringify(enviadas));
}

function enviarNotif({ title, body, tag, delay }) {
  if (swReg) {
    // Via Service Worker — funciona aunque la app esté en segundo plano
    navigator.serviceWorker.ready.then(reg => {
      reg.active?.postMessage({ type:'SCHEDULE_NOTIF', title, body, tag, delay });
    });
  } else {
    // Fallback directo (solo funciona con app abierta)
    setTimeout(() => {
      if (Notification.permission === 'granted') {
        new Notification(title, { body, tag,
          icon: 'https://cdn.jsdelivr.net/npm/twemoji@14/2/72x72/1f4cb.png' });
      }
    }, delay || 0);
  }
}

function verificarNotificacionesPendientes() {
  setTimeout(programarNotificaciones, 3000);
}

// ── PWA HINT ──────────────────────────────────────────────────
function mostrarHintPWA() {
  const hint=document.getElementById('installHint');
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid=/android/i.test(navigator.userAgent);
  const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(!isStandalone) {
    if(isIOS) { hint.style.display='block'; hint.innerHTML='📱 <strong>Añadir a pantalla de inicio:</strong> pulsa <strong>Compartir ↑</strong> → "Añadir a inicio" para usarla como app nativa.'; }
    else if(isAndroid) { hint.style.display='block'; hint.innerHTML='📱 <strong>Instalar como app:</strong> pulsa el menú ⋮ del navegador → "Añadir a pantalla de inicio".'; }
  }
}

// ── EXPORTAR ──────────────────────────────────────────────────
function exportarMisCursos() {
  if(!misCursos.length) { mostrarToast('⚠️ Sin cursos','#f0c060'); return; }
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(misCursos.map(c=>({'FECHA':c.fecha,'CURSO':c.curso,'INICIO':c.inicio,'FIN':c.fin,'LUGAR':c.lugar,'SOLICITANTE':c.solicitante,'OBSERVACIONES':c.obs,'REALIZADO':c.realizado?'SÍ':'NO'})));
  ws['!cols']=[{wch:12},{wch:22},{wch:8},{wch:8},{wch:28},{wch:20},{wch:35},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'Mis Cursos');
  XLSX.writeFile(wb,`miscursos_${usuarioActual}_${new Date().toISOString().split('T')[0]}.xlsx`);
  mostrarToast('📤 Excel exportado');
}

// ── TOAST ─────────────────────────────────────────────────────
function mostrarToast(msg,color='#00b880') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600);
}
// ══════════════════════════════════════════════════════════════
// CHECKLIST
// ══════════════════════════════════════════════════════════════
function renderChecklist(c, idx) {
  const pasos = [
    { key:'docRecogida',  label:'Documentación recogida',  icon:'📥' },
    { key:'docEntregada', label:'Documentación entregada', icon:'📤' },
    { key:'factEmitida',  label:'Factura emitida',         icon:'🧾' },
  ];
  const completados = pasos.filter(p => c[p.key]).length;
  const todoOk = completados === 3;
  const items = pasos.map(p => `
    <div class="check-item ${c[p.key]?'done':''}" data-action="check" data-idx="${idx}" data-campo="${p.key}">
      <div class="check-circle">${c[p.key]?'✓':''}</div>
      <div class="check-label">${p.icon} ${p.label}</div>
    </div>`).join('');
  const barras = pasos.map(p => `<div class="progress-step ${c[p.key]?'done':''}"></div>`).join('');
  return `<div class="checklist-wrap">
    ${items}
    <div class="checklist-progress">${barras}</div>
    ${todoOk ? '<div class="checklist-completo">✅ COMPLETO — marcando como realizado…</div>' : ''}
  </div>`;
}

async function toggleCheck(e, idx, campo) {
  e.stopPropagation();
  const c = misCursos[idx]; if (!c) return;

  // Toggle local inmediato
  c[campo] = !c[campo];
  const todoCompleto = c.docRecogida && c.docEntregada && c.factEmitida;
  if (todoCompleto) c.realizado = true;

  // Render INMEDIATO — sin esperar al Sheet
  render();
  if (todoCompleto) mostrarToast('✅ ¡Curso completado!');

  // Guardar en Sheet en segundo plano
  try {
    setSyncSyncing('Guardando…');
    await updateCurso(c);
    setSyncOk(`Actualizado · ${new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}`);
  } catch(err) {
    // Revertir si falla
    c[campo] = !c[campo];
    if (todoCompleto) c.realizado = false;
    render();
    setSyncError('Error al guardar');
    mostrarToast('❌ Error','#ff6060');
  }
}

function toRow(c) {
  const todoCompleto = c.docRecogida && c.docEntregada && c.factEmitida;
  return [
    (c.realizado || todoCompleto) ? true : false,
    c.fecha, c.inicio, c.fin, c.curso, c.lugar,
    c.instructor, c.solicitante, c.obs, c.autor,
    c.id || '',
    c.docRecogida  ? true : false,
    c.docEntregada ? true : false,
    c.factEmitida  ? true : false,
  ];
}

async function getSheetId() {
  const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: SHEET_ID });
  return meta.result.sheets.find(s => s.properties.title === TAB_CURSOS)?.properties.sheetId ?? 0;
}

async function updateCurso(c) {
  if (!c._row) return;
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId: SHEET_ID,
    range: `${TAB_CURSOS}!A${c._row}:N${c._row}`,
    valueInputOption: 'USER_ENTERED',
    resource: { values: [toRow(c)] },
  });
}

// EVENT DELEGATION — iOS Safari compatible
document.addEventListener('click', function(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  e.stopPropagation();
  const action = el.dataset.action;
  const idx    = parseInt(el.dataset.idx);

  if      (action === 'detalle')    verDetalle(idx);
  else if (action === 'cal')        abrirCalModal(idx);
  else if (action === 'caldetalle') { cerrarDetalle(); abrirCalModal(idx); }
  else if (action === 'check')       { const campo = el.dataset.campo; toggleCheck(e, idx, campo); }
});
